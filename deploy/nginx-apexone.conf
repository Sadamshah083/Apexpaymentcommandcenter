server {
    listen 80;
    listen [::]:80;
    server_name crm.apexonepayments.com;

    # Redirect all plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.apexonepayments.com;

    ssl_certificate /etc/letsencrypt/live/crm.apexonepayments.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.apexonepayments.com/privkey.pem;

    # Reasonable modern TLS defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/apexone/public;
    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;
    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Morpheus browser phone — proxy SIP WebSocket over HTTPS :443 (avoids blocked :7443).
    location /morpheus-ws/ {
        proxy_pass https://apexone.morpheus.cx:7443/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host apexone.morpheus.cx;
        proxy_set_header Origin https://apexone.morpheus.cx;
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
